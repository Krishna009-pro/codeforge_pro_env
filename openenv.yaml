spec_version: 1
name: codeforge_pro_env
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: Real-world software engineering RL environment (code review → pipeline debugging). Easy→Expert tasks with dense rewards and programmatic graders.
tags: ["openenv", "coding", "rl", "agentic"]
version: "1.0.0"

tasks:
  - id: "easy_review"
    name: "Easy: Code Review"
    description: "Review small PR for style/security"
    difficulty: "easy"
    grader: "server.graders:grade_easy_review"
  - id: "medium_triage"
    name: "Medium: Bug Triage"
    description: "Triage IndexError in data loader"
    difficulty: "medium"
    grader: "server.graders:grade_medium_triage"
  - id: "security_audit"
    name: "Medium: Security Audit"
    description: "Audit config for hardcoded secrets"
    difficulty: "medium"
    grader: "server.graders:grade_security_audit"
  - id: "hard_pipeline"
    name: "Hard: Data Pipeline"
    description: "Fix failing ETL pipeline (CSV/JSON)"
    difficulty: "hard"
    grader: "server.graders:grade_hard_pipeline"
  - id: "ci_pipeline_fix"
    name: "Hard: CI Pipeline"
    description: "Fix broken GitHub Action YAML syntax"
    difficulty: "hard"
    grader: "server.graders:grade_ci_pipeline_fix"
  - id: "expert_refactor"
    name: "Expert: Code Refactor"
    description: "Refactor legacy async code + add tests"
    difficulty: "expert"
    grader: "server.graders:grade_expert_refactor"
  - id: "pro_deploy"
    name: "Expert: Safe Deployment"
    description: "Simulate safe deployment with rollback"
    difficulty: "expert"
    grader: "server.graders:grade_pro_deploy"
  - id: "api_migration"
    name: "Expert: API Migration"
    description: "Migrate from v1 to v2 internal API"
    difficulty: "expert"
    grader: "server.graders:grade_api_migration"
  - id: "doc_update"
    name: "Easy: Documentation Update"
    description: "Fix broken links and outdated versions in README"
    difficulty: "easy"
    grader: "server.graders:grade_doc_update"
